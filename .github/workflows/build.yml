name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poppler
        run: choco install poppler -y
        shell: powershell

      - name: Find poppler bin path
        id: poppler
        run: |
          $candidates = @(
            "C:\ProgramData\chocolatey\lib\poppler\tools\Library\bin",
            "C:\ProgramData\chocolatey\lib\poppler\tools\bin",
            "C:\tools\poppler\Library\bin",
            "C:\tools\poppler\bin"
          )
          $found = $candidates | Where-Object { Test-Path (Join-Path $_ "pdftoppm.exe") } | Select-Object -First 1
          if (-not $found) {
            $found = Get-ChildItem "C:\ProgramData\chocolatey\lib\poppler" -Recurse -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 | ForEach-Object { $_.DirectoryName }
          }
          if (-not $found) { Write-Error "pdftoppm.exe not found"; exit 1 }
          echo "POPPLER_PATH=$found" >> $env:GITHUB_OUTPUT
          echo "Found poppler at: $found"
        shell: powershell

      - name: Install Python dependencies
        run: pip install pdf2image pillow pyinstaller tkinterdnd2

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "PDF修復工具_繁中破字" `
            --add-binary "${{ steps.poppler.outputs.POPPLER_PATH }};poppler/Library/bin" `
            fix_notebooklm_pdf.py
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF修復工具_Windows
          path: "dist/PDF修復工具_繁中破字.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具
            **使用方式**
            - 雙擊開啟視窗 → 拖曳或選擇 PDF → 按「開始修復」
            - 或直接將 PDF 拖曳到 .exe 圖示上執行
          files: "dist/PDF修復工具_繁中破字.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
