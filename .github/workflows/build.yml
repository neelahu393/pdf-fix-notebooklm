name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pymupdf pillow tkinterdnd2

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "pdf_fix_tool" `
            fix_notebooklm_pdf.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Fix_Tool_Windows
          path: dist/pdf_fix_tool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具

            使用 pymupdf 渲染，內建 CJK 字型支援，不依賴系統字型或 poppler。

            **使用方式**
            - 雙擊開啟視窗 → 拖曳或選擇 PDF → 按「開始修復」
            - 或直接將 PDF 拖曳到 .exe 圖示上執行
          files: dist/pdf_fix_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
