name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download Poppler and Font
      shell: pwsh
      run: |
        # 1. 建立 fonts 資料夾並自動下載 Google Noto Sans CJK TC (OTF 格式)
        New-Item -ItemType Directory -Force -Path fonts
        Invoke-WebRequest -Uri "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" -OutFile "fonts\NotoSansCJKtc-Regular.otf"

        # 2. 自動下載 Poppler Windows 版並解壓縮
        Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip" -OutFile "poppler.zip"
        Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_extracted"
        
        # 3. 將解壓縮後的資料夾重新命名為 poppler，以符合 Python 程式碼中的路徑
        $extractedFolder = Get-ChildItem -Path poppler_extracted -Directory | Select-Object -First 1
        Move-Item -Path $extractedFolder.FullName -Destination ".\poppler"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pdf2image tkinterdnd2

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --add-data "fonts;fonts" --add-data "poppler;poppler" fix_notebooklm_pdf.py

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: PDF_Fix_Tool_Windows
        path: dist/fix_notebooklm_pdf.exe
