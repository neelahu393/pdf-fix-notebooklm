name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Poppler and Font
        shell: pwsh
        run: |
          # 建立 fonts 資料夾並直接下載單一 Noto Sans TC Regular TTF 檔案，避免 ZIP 解壓縮失敗
          New-Item -ItemType Directory -Force -Path fonts
          Invoke-WebRequest -Uri "https://github.com/notofonts/noto-cjk/raw/main/Sans/TTF/NotoSansTC-Regular.ttf" -OutFile "fonts\NotoSansTC-Regular.ttf"
          Write-Host "Font downloaded: $(Get-Item fonts\NotoSansTC-Regular.ttf).Length bytes"

          # 下載並解壓縮 Poppler
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip" -OutFile "poppler.zip"
          Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_extracted"

          # 找到 pdftoppm.exe 並把整個 bin 目錄放到 poppler/Library/bin
          $pdfBin = (Get-ChildItem -Path poppler_extracted -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1).DirectoryName
          New-Item -ItemType Directory -Force -Path "poppler\Library\bin"
          Copy-Item "$pdfBin\*" -Destination "poppler\Library\bin\" -Recurse

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pdf2image pillow tkinterdnd2

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "pdf_fix_tool" `
            --add-data "fonts;fonts" `
            --add-data "poppler;poppler" `
            fix_notebooklm_pdf.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Fix_Tool_Windows
          path: dist/pdf_fix_tool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具 (平滑 TTF 版)
            移除易當機的 Cairo 參數，改用 TTF 格式字型徹底解決 Poppler 渲染的鋸齒與當機問題。
          files: dist/pdf_fix_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
