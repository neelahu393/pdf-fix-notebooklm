name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poppler via conda
        run: |
          conda install -c conda-forge poppler -y
          $binPath = (Get-Command pdftoppm.exe).Source | Split-Path
          Write-Host "Poppler bin: $binPath"
          echo "POPPLER_PATH=$binPath" >> $env:GITHUB_OUTPUT
        shell: powershell
        id: poppler

      - name: Install Python dependencies
        run: pip install pdf2image pillow pyinstaller tkinterdnd2

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "PDF修復工具_繁中破字" `
            --add-binary "${{ steps.poppler.outputs.POPPLER_PATH }};poppler/Library/bin" `
            fix_notebooklm_pdf.py
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF修復工具_Windows
          path: "dist/PDF修復工具_繁中破字.exe"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具
            **使用方式**
            - 雙擊開啟視窗 → 拖曳或選擇 PDF → 按「開始修復」
            - 或直接將 PDF 拖曳到 .exe 圖示上執行
          files: "dist/PDF修復工具_繁中破字.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
