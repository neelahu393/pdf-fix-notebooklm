name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download poppler Windows binary
        id: poppler
        run: |
          $url = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          Invoke-WebRequest -Uri $url -OutFile "poppler.zip"
          Expand-Archive -Path "poppler.zip" -DestinationPath "poppler-dist"
          $binPath = (Get-ChildItem "poppler-dist" -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1).DirectoryName
          Write-Host "Poppler bin: $binPath"
          echo "POPPLER_PATH=$binPath" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Download Noto Sans TC fonts (via pip fontools / direct)
        run: |
          New-Item -ItemType Directory -Force -Path "fonts"
          # 用 pip 安裝 requests，然後從 Google Fonts API 下載
          pip install requests -q
          python -c "
          import requests, os, zipfile, io

          # 從 Google Fonts 下載 Noto Sans TC zip
          url = 'https://fonts.google.com/download?family=Noto+Sans+TC'
          print('Downloading Noto Sans TC from Google Fonts...')
          r = requests.get(url, timeout=60)
          r.raise_for_status()
          z = zipfile.ZipFile(io.BytesIO(r.content))
          # 只抽取 Regular 和 Bold
          for name in z.namelist():
              if ('Regular' in name or 'Bold' in name) and name.endswith('.ttf'):
                  z.extract(name, 'fonts_tmp')
                  print(f'Extracted: {name}')
          # 移到 fonts/
          import shutil
          for root, dirs, files in os.walk('fonts_tmp'):
              for f in files:
                  src = os.path.join(root, f)
                  dst = os.path.join('fonts', os.path.basename(f))
                  shutil.copy(src, dst)
                  print(f'Copied: {dst}')
          "
          Get-ChildItem fonts
        shell: powershell

      - name: Create fonts.conf
        run: |
          $fontsDir = (Resolve-Path "fonts").Path.Replace('\', '/')
          $conf = "<?xml version='1.0'?>
          <!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>
          <fontconfig>
            <dir>./fonts</dir>
            <cachedir>./fonts/cache</cachedir>
            <match target='pattern'>
              <test qual='any' name='family'><string>sans-serif</string></test>
              <edit name='family' mode='prepend' binding='strong'>
                <string>Noto Sans TC</string>
              </edit>
            </match>
            <match target='pattern'>
              <test qual='any' name='family'><string>serif</string></test>
              <edit name='family' mode='prepend' binding='strong'>
                <string>Noto Sans TC</string>
              </edit>
            </match>
          </fontconfig>"
          $conf | Out-File -FilePath "fonts.conf" -Encoding UTF8
          Write-Host "fonts.conf created"
        shell: powershell

      - name: Install Python dependencies
        run: pip install pdf2image pillow pyinstaller tkinterdnd2

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "pdf_fix_tool" `
            --add-binary "${{ steps.poppler.outputs.POPPLER_PATH }};poppler/Library/bin" `
            --add-data "fonts;fonts" `
            --add-data "fonts.conf;." `
            fix_notebooklm_pdf.py
        shell: powershell

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf_fix_tool_windows
          path: dist/pdf_fix_tool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具

            內建 Noto Sans TC 字型，修復 poppler Windows 繁體中文渲染問題。

            **使用方式**
            - 雙擊開啟視窗 → 拖曳或選擇 PDF → 按「開始修復」
            - 或直接將 PDF 拖曳到 .exe 圖示上執行
          files: dist/pdf_fix_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
