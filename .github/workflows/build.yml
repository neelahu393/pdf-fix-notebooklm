name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Poppler and Font via Python
        shell: python
        run: |
          import urllib.request
          import zipfile
          import os
          import shutil

          # 建立目標資料夾
          os.makedirs("fonts", exist_ok=True)
          os.makedirs(os.path.join("poppler", "Library", "bin"), exist_ok=True)

          # 1. 從 Google Fonts 官方下載並提取 TTF 字型
          print("Downloading Noto Sans TC...")
          urllib.request.urlretrieve("https://fonts.google.com/download?family=Noto%20Sans%20TC", "noto.zip")
          
          with zipfile.ZipFile("noto.zip", "r") as z:
              z.extractall("fonts_extracted")
              
          for root, _, files in os.walk("fonts_extracted"):
              for file in files:
                  if file.endswith("Regular.ttf"):
                      shutil.copy(os.path.join(root, file), os.path.join("fonts", "NotoSansTC-Regular.ttf"))
                      print("✅ Font extracted successfully.")
                      break

          # 2. 下載並提取 Poppler
          print("Downloading Poppler...")
          urllib.request.urlretrieve("https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip", "poppler.zip")
          
          with zipfile.ZipFile("poppler.zip", "r") as z:
              z.extractall("poppler_extracted")
              
          for root, _, files in os.walk("poppler_extracted"):
              if "pdftoppm.exe" in files:
                  for item in os.listdir(root):
                      s = os.path.join(root, item)
                      d = os.path.join("poppler", "Library", "bin", item)
                      if os.path.isfile(s):
                          shutil.copy2(s, d)
                  print("✅ Poppler extracted successfully.")
                  break

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pdf2image pillow tkinterdnd2

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "pdf_fix_tool" `
            --add-data "fonts;fonts" `
            --add-data "poppler;poppler" `
            fix_notebooklm_pdf.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Fix_Tool_Windows
          path: dist/pdf_fix_tool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具 (平滑 TTF 版)
            改用 Python 穩定提取 TTF 格式字型與 Poppler，徹底解決渲染的鋸齒與執行死結問題。
          files: dist/pdf_fix_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
