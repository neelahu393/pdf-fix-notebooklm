name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyMuPDF tkinterdnd2

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "pdf_fix_tool_pymupdf" `
            fix_notebooklm_pdf.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Fix_Tool_Windows
          path: dist/pdf_fix_tool_pymupdf.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具 (PyMuPDF 版)
            已更換為高容錯率引擎，無需依賴外部字型檔與組件。
          files: dist/pdf_fix_tool_pymupdf.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
