name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Poppler and Font
        shell: pwsh
        run: |
          # 建立 fonts 資料夾並下載 Noto Sans CJK TC
          New-Item -ItemType Directory -Force -Path fonts
          Invoke-WebRequest -Uri "https://github.com/notofonts/noto-cjk/raw/main/Sans/OTF/TraditionalChinese/NotoSansCJKtc-Regular.otf" -OutFile "fonts\NotoSansCJKtc-Regular.otf"
          Write-Host "Font downloaded: $(Get-Item fonts\NotoSansCJKtc-Regular.otf).Length bytes"

          # 下載並解壓縮 Poppler
          Invoke-WebRequest -Uri "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip" -OutFile "poppler.zip"
          Expand-Archive -Path "poppler.zip" -DestinationPath "poppler_extracted"

          # 找到 pdftoppm.exe 並把整個 bin 目錄放到 poppler/Library/bin
          $pdfBin = (Get-ChildItem -Path poppler_extracted -Recurse -Filter "pdftoppm.exe" | Select-Object -First 1).DirectoryName
          Write-Host "pdftoppm found at: $pdfBin"
          New-Item -ItemType Directory -Force -Path "poppler\Library\bin"
          Copy-Item "$pdfBin\*" -Destination "poppler\Library\bin\" -Recurse
          Write-Host "Poppler bin contents:"
          Get-ChildItem "poppler\Library\bin" | Select-Object Name

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pdf2image pillow tkinterdnd2

      - name: Build EXE with PyInstaller
        shell: pwsh
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "pdf_fix_tool" `
            --add-data "fonts;fonts" `
            --add-data "poppler;poppler" `
            fix_notebooklm_pdf.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF_Fix_Tool_Windows
          path: dist/pdf_fix_tool.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Build ${{ github.run_number }}"
          body: |
            ## PDF 繁中破字修復工具
            內建 Noto Sans CJK TC 字型，修復 poppler Windows 繁體中文渲染問題。

            使用方式
            - 雙擊開啟視窗 → 拖曳或選擇 PDF → 按「開始修復」
            - 或直接將 PDF 拖曳到 .exe 圖示上執行
          files: dist/pdf_fix_tool.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
